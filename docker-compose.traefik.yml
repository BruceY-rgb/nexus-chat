# Traefik reverse proxy configuration
# For Dokploy/Docker Swarm deployment
# Usage:
# 1. Deploy this file as traefik's docker-compose.yml
# 2. Or integrate configuration into existing Traefik instance

version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik-logs:/var/log/traefik
    networks:
      - dokploy-network
    labels:
      # Enable Traefik
      - "traefik.enable=true"

      # HTTP entrypoint
      - "traefik.http.entrypoints.web.address=:80"
      - "traefik.http.entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "traefik.http.entrypoints.web.http.redirections.entrypoint.scheme=https"

      # HTTPS entrypoint
      - "traefik.http.entrypoints.websecure.address=:443"

      # Dashboard
      - "traefik.http.api.dashboard=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.slack.rlenv.data4o.ai`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"

      # Logging
      - "traefik.log.level=INFO"
      - "traefik.accesslog=true"

volumes:
  traefik-logs:
    driver: local

networks:
  dokploy-network:
    external: true
