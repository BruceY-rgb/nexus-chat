# Traefik v3.x configuration file
# For WebSocket and reverse proxy

api:
  dashboard: true
  insecure: true  # Development only, use secure config in production

# Define entry points
entryPoints:
  # HTTP entrypoint - auto redirect to HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entrypoint:
          to: websecure
          scheme: https

  # HTTPS entrypoint
  websecure:
    address: ":443"

# Let's Encrypt certificate auto-issuance
certificatesResolvers:
  letsencrypt:
    acme:
      email: your-email@example.com  # Replace with your email
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

# Enable Docker provider
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: dokploy-network  # Use Dokploy's network

# Enable file provider (for static configuration)
providers:
  file:
    filename: /etc/traefik/traefik.yml
    watch: true

# Logging configuration
log:
  level: INFO
  filePath: "/var/log/traefik/traefik.log"

# Access logging
accessLog:
  filePath: "/var/log/traefik/access.log"

# Global configuration
global:
  sendAnonymousUsage: false

---
# Dynamic configuration file example - create separate file
# This file should be saved as traefik-dynamic.yml
