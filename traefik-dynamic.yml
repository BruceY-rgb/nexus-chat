# Traefik dynamic configuration file
# For defining middleware and services

# Middleware definitions
http:
  middlewares:
    # WebSocket support middleware
    websocket-support:
      headers:
        customRequestHeaders:
          Upgrade: "upgrade"
          Connection: "keep-alive"

    # Compression middleware
    compress:
      compression: {}

    # Security headers middleware
    security-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowOriginList:
          - "https://instagram.rlenv.data4o.ai"
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        referrerPolicy: "strict-origin-when-cross-origin"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true

    # CORS middleware
    cors-headers:
      headers:
        accessControlAllowCredentials: true
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "Cookie"
          - "X-Requested-With"
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowOriginList:
          - "https://instagram.rlenv.data4o.ai"
        accessControlMaxAge: 86400

# TCP configuration (for WebSocket)
tcp:
  serversTransitions:
    # If TCP proxy is needed, configure here
    passHostHeader: true
