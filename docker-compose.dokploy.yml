# Dokploy Traefik Configuration
# For Dokploy environment

version: '3.8'

services:
  app:
    image: IMAGE_PLACEHOLDER
    container_name: slack_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@dokploy-postgres:5432/${DB_NAME}?schema=public
      DB_HOST: dokploy-postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      PORT: 3000
      WEBSOCKET_PORT: 3001

      # Email configuration
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO}
      APP_NAME: ${APP_NAME}

      # OSS configuration
      OSS_REGION: ${OSS_REGION}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET}
      OSS_ENDPOINT: ${OSS_ENDPOINT}

      # Feature flags
      ENABLE_FILE_UPLOAD: ${ENABLE_FILE_UPLOAD}
      ENABLE_SEARCH: ${ENABLE_SEARCH}
      ENABLE_NOTIFICATIONS: ${ENABLE_NOTIFICATIONS}
      ENABLE_EMAIL_NOTIFICATIONS: ${ENABLE_EMAIL_NOTIFICATIONS}

      # File upload limits
      MAX_FILE_SIZE: ${MAX_FILE_SIZE}
      ALLOWED_FILE_TYPES: ${ALLOWED_FILE_TYPES}

      # Rate limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: ${LOG_FORMAT}
    # Dokploy Traefik labels
    labels:
      # Enable Traefik
      - "traefik.enable=true"

      # HTTP route
      - "traefik.http.routers.slack-app-http.rule=Host(`slack.rlenv.data4o.ai`)"
      - "traefik.http.routers.slack-app-http.entrypoints=web"
      - "traefik.http.routers.slack-app-http.middlewares=redirect-to-https"

      # HTTPS route
      - "traefik.http.routers.slack-app.rule=Host(`slack.rlenv.data4o.ai`)"
      - "traefik.http.routers.slack-app.entrypoints=websecure"
      - "traefik.http.routers.slack-app.tls=true"

      # WebSocket support - fix configuration
      - "traefik.http.services.slack-app.loadbalancer.server.port=3000"
      # Proper WebSocket upgrade header configuration
      - "traefik.http.middlewares.slack-websocket.headers.customrequestheaders.Upgrade=websocket"
      - "traefik.http.middlewares.slack-websocket.headers.customrequestheaders.Connection=upgrade"

      # Application middleware
      - "traefik.http.routers.slack-app.middlewares=slack-websocket"

      # Additional WebSocket support configuration
      - "traefik.http.middlewares.slack-websocket.headers.customresponseheaders.Upgrade=websocket"
      - "traefik.http.middlewares.slack-websocket.headers.customresponseheaders.Connection=upgrade"

    networks:
      - dokploy-network

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: slack_mcp
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@dokploy-postgres:5432/${DB_NAME}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3002
      MCP_MODE: http
      INTERNAL_API_URL: https://slack-mcp.ontuotu.com
    labels:
      - "traefik.enable=true"
      # HTTP route + redirect to HTTPS
      - "traefik.http.routers.mcp-http.rule=Host(`slack-mcp.ontuotu.com`)"
      - "traefik.http.routers.mcp-http.entrypoints=web"
      - "traefik.http.routers.mcp-http.middlewares=mcp-redirect"
      - "traefik.http.middlewares.mcp-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.mcp-redirect.redirectscheme.permanent=true"
      # HTTPS route
      - "traefik.http.routers.mcp.rule=Host(`slack-mcp.ontuotu.com`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls=true"
      - "traefik.http.routers.mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.mcp.loadbalancer.server.port=3002"
    networks:
      - dokploy-network
    depends_on:
      - app

networks:
  dokploy-network:
    external: true
