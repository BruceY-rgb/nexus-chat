# =====================================================
# Production configuration adapted for Dokploy (Docker Swarm)
# =====================================================

version: '3.8'

services:
  # Next.js application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    # In Dokploy mode, it is recommended to configure environment variables through the panel, or keep the following mapping
    environment:
      - NODE_ENV=production
      # Note: hostname changed from db to dokploy-postgres
      - DATABASE_URL=postgresql://${DB_USER:-yangsmac}:${DB_PASSWORD}@dokploy-postgres:5432/${DB_NAME:-slack_chat}?schema=public
      - DB_HOST=dokploy-postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-yangsmac}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-slack_chat}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - PORT=3000
      - WEBSOCKET_PORT=3001
    ports:
      - "3000:3000"
    networks:
      - dokploy-network
    # Ensure application starts after database is ready (depends_on is only a reference in Swarm mode)
    deploy:
      restart_policy:
        condition: on-failure

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - dokploy-network

# Key: Connect to Dokploy's existing network
networks:
  dokploy-network:
    external: true
