# =====================================================
# Docker Compose Template - Multi-Instance Deployment
# Usage:
# 1. Copy template directory and rename to instance name
# 2. Modify port configuration in .env
# 3. Use docker-compose -p <instance_name> up -d to start
# =====================================================

services:
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: ${INSTANCE_NAME}_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    networks:
      - slack_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database initialization service - runs Prisma migrations
  db-init:
    build:
      context: ../..
      dockerfile: Dockerfile.dev
    container_name: ${INSTANCE_NAME}_db_init
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - slack_network
    volumes:
      - ../../db/init.sql:/init.sql:ro
      - ../../db/slack-init.sql:/slack-init.sql:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Running Prisma migrations..."
        npx prisma generate
        # First try migrate deploy (standard migration)
        npx prisma migrate deploy || true
        # If no migration exists, use db push to sync schema
        npx prisma db push --accept-data-loss || true
        echo "Database schema synchronized!"
        echo "Applying init.sql (triggers and indexes)..."
        PGPASSWORD=$DB_PASSWORD psql -h db -U $DB_USER -d $DB_NAME -f /init.sql || true
        echo "Applying Slack data init.sql..."
        PGPASSWORD=$DB_PASSWORD psql -h db -U $DB_USER -d $DB_NAME -f /slack-init.sql --set ON_ERROR_STOP=on || true
        echo "Init SQL applied!"
        exit 0

  # Next.js development application
  app:
    build:
      context: ../..
      dockerfile: Dockerfile.dev
    container_name: ${INSTANCE_NAME}_app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO}
      APP_NAME: ${APP_NAME}
      SESSION_SECRET: ${SESSION_SECRET}
      OSS_REGION: ${OSS_REGION}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET}
      OSS_ENDPOINT: ${OSS_ENDPOINT}
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT}
      ENABLE_FILE_UPLOAD: ${ENABLE_FILE_UPLOAD}
      ENABLE_SEARCH: ${ENABLE_SEARCH}
      ENABLE_NOTIFICATIONS: ${ENABLE_NOTIFICATIONS}
      ENABLE_EMAIL_NOTIFICATIONS: ${ENABLE_EMAIL_NOTIFICATIONS}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE}
      ALLOWED_FILE_TYPES: ${ALLOWED_FILE_TYPES}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: ${LOG_FORMAT}
    ports:
      - "${APP_PORT}:3000"
      - "${MCP_PORT}:3002"   # MCP Server
      - "24678:24678"              # Next.js HMR port
    depends_on:
      db:
        condition: service_healthy
    networks:
      - slack_network
    volumes:
      # Mount source code for hot reload
      - ../../:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
    driver: local

networks:
  slack_network:
    driver: bridge
